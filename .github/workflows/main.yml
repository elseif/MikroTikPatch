
name: Patch Mikrotik RouterOS
on:
  schedule:
    - cron: "00 09 * * *"   # At UTC 09:00 (Beijing 17:00) on every day
  workflow_dispatch:  
    inputs:
      version:
        description: 'Select Version (v6/v7/all)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - v6
          - v7
jobs:
  Patch_Stable_V7:
    if: |
      (github.event_name == 'schedule') || 
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.version == 'all' || github.event.inputs.version == 'v7'))
    uses: ./.github/workflows/patch_v7.yml
    with:
      channel: stable
      release: true
    secrets: inherit

  Patch_LongTerm_V7:
    if: |
      (github.event_name == 'schedule') || 
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.version == 'all' || github.event.inputs.version == 'v7'))
    uses: ./.github/workflows/patch_v7.yml
    with:
      channel: long-term
      release: true
    secrets: inherit

  Patch_Testing_V7:
    if: |
      (github.event_name == 'schedule') || 
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.version == 'all' || github.event.inputs.version == 'v7'))
    uses: ./.github/workflows/patch_v7.yml
    with:
      channel: testing
      release: true
    secrets: inherit
    
  Patch_Development_V7:
    if: |
      (github.event_name == 'schedule') || 
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.version == 'all' || github.event.inputs.version == 'v7'))
    uses: ./.github/workflows/patch_v7.yml
    with:
      channel: development
      release: true
    secrets: inherit
    
  Patch_Stable_V6:
    if: |
      (github.event_name == 'schedule') || 
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.version == 'all' || github.event.inputs.version == 'v6'))
    uses: ./.github/workflows/patch_v6.yml
    with:
      channel: stable
      release: true
    secrets: inherit

  Patch_LongTerm_V6:
    if: |
      (github.event_name == 'schedule') || 
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.version == 'all' || github.event.inputs.version == 'v6'))
    uses: ./.github/workflows/patch_v6.yml
    with:
      channel: long-term
      release: true
    secrets: inherit
